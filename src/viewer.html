<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Image Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
            background-color: #1a1b1e;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            border-radius: 12px;
        }

        /* Header / Title Bar */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: rgba(35, 36, 41, 0.8);
            -webkit-app-region: drag;
            z-index: 100;
        }

        .header-title {
            color: #e6e7eb;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .window-controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .window-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 0.5rem;
            background-color: transparent;
            color: #e6e7eb;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        .window-btn:hover {
            background-color: rgba(76, 79, 87, 0.5);
        }

        img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title">Viewer</div>
        <div class="window-controls">
            <button class="window-btn" id="closeBtn">×</button>
        </div>
    </div>

    <!-- Image -->
    <img id="viewerImage" src="" alt="Captured Image">

    <script>
        // Set the image source
        window.viewerAPI.onLoadImage((dataUrl) => {
            document.getElementById('viewerImage').src = dataUrl;
        });

        // Close window
        document.getElementById('closeBtn').addEventListener('click', () => {
            window.viewerAPI.close();
        });
    </script>
</body>

</html>
